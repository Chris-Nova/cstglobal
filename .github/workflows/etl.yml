name: ETL Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  run-etl:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
      SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run ETL scrapers
        run: python -m etl.runner --sequential
        working-directory: ${{ github.workspace }}

      - name: Report results
        if: always()
        run: echo "ETL run completed at $(date)"
